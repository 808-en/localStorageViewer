<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My localStorage Content (Inline)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .content-box {
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 20px;
            margin-top: 20px;
            white-space: pre-wrap;
            font-family: monospace;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            color: #fff;
        }

        .refresh-btn {
            background-color: #007bff;
        }

        .clear-btn {
            background-color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Your localStorage Items</h1>
        <div id="localStorage-content" class="content-box">
            <p>Loading...</p>
        </div>
        <div class="controls">
            <button class="refresh-btn" onclick="displayLocalStorage()">Refresh</button>
            <button class="clear-btn" onclick="clearLocalStorage()">Clear All</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            displayLocalStorage();
        });

        function displayLocalStorage() {
            const contentBox = document.getElementById('localStorage-content');
            let output = '';

            if (localStorage.length === 0) {
                output = '<p>Your localStorage is currently empty for this domain.</p>';
            } else {
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    const value = localStorage.getItem(key);
                    output += `<strong>Key:</strong> ${key}<br><strong>Value:</strong> ${value}<br><br>`;
                }
            }
            
            contentBox.innerHTML = output;
        }

        function clearLocalStorage() {
            if (confirm("Are you sure you want to clear all items in your localStorage? This cannot be undone.")) {
                localStorage.clear();
                displayLocalStorage();
            }
        }
    </script>
</body>
</html>
